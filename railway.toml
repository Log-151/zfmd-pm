[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile=false && pnpm --filter @workspace/api-server run build && BASE_PATH=/ pnpm --filter @workspace/project-mgmt run build && pnpm --filter @workspace/db run push"

[deploy]
startCommand = "NODE_ENV=production node --enable-source-maps artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
